name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: chmod +x gradlew && ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v3
        with:
          name: spearmod-jar
          path: build/libs/spearmod-1.0.0.jar
